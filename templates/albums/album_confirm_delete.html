{% extends 'base.html' %}
{% block content %}
  <div class="card rounded-4 shadow-sm border-0 p-4">
    <h2 class="fw-bold mb-3">Delete album</h2>
    <p class="text-secondary mb-4">Are you sure you want to permanently delete <strong>{{ object.title }}</strong>? This cannot be undone.</p>
    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-3 flex-wrap">
        <button type="submit" class="btn btn-danger">Yes, delete</button>
        <a class="btn btn-outline-secondary" href="{% url 'albums:detail' object.pk %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
