{% extends 'base.html' %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card rounded-4 shadow-sm border-0">
        <div class="card-body p-5">
          <p class="text-uppercase text-primary fw-semibold mb-3">Sign in</p>
          <h2 class="fw-bold mb-4">Welcome back</h2>
          <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            {% if form.errors %}
              <div class="alert alert-danger">Please correct the error(s) below.</div>
            {% endif %}
            {{ form.as_p }}
            {% if next %}
              <input type="hidden" name="next" value="{{ next }}" />
            {% endif %}
            <button type="submit" class="btn btn-primary btn-lg mt-3">Log in</button>
          </form>
          <p class="mt-3 mb-0">Don’t have an account? <a href="{% url 'albums:register' %}">Sign up</a></p>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
