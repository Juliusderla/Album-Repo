{% extends 'base.html' %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card rounded-4 shadow-sm border-0">
        <div class="card-body p-5">
          <p class="text-uppercase text-primary fw-semibold mb-3">Create account</p>
          <h2 class="fw-bold mb-4">Get started</h2>
          <form method="post">
            {% csrf_token %}
            {% if form.errors %}
              <div class="alert alert-danger">Please correct the error(s) below.</div>
            {% endif %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-lg mt-3">Sign up</button>
          </form>
          <p class="mt-3 mb-0">Already have an account? <a href="{% url 'login' %}">Login</a></p>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
